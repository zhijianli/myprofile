            - generic [ref=e63]: "01"
            - generic [ref=e65]: 关于我
          - heading "走到十字路口之前" [level=2] [ref=e66]
        - paragraph [ref=e67]: 我现在觉得，很多事情规划不出来，叙事弧线是当生命中的各个事情发生之后自己串联剪辑出来的，貌似乔布斯在他那次著名的演讲中也讲过类似的观点。
        - generic [ref=e68]:
          - paragraph [ref=e69]: 我长居杭州，职业生涯从阿里巴巴 Java 工程师起步，做过最出圈的产品是天猫超市，产品足够伟大，但我只是冗长流水线上的一颗螺丝钉，这段生涯对我最直接的意义是让我明白很多做事的逻辑与方法论，但当时的我并不明白自己到底想做什么。
          - paragraph [ref=e70]: 因此我开启了漫长的奥德赛时期，做过音乐平台，也做过条漫平台，这两样虽然都是我喜欢的东西，但一旦进入到深水区之后，我发现和里面的氛围格格不入，可能这些试错都是必经之路，但于我来说，正面反馈并不多。
          - paragraph [ref=e71]: 而在这段漫长的奥德赛时期，武志红提供了一个出口，让我遇见了心理咨询，并在后续的学习过程中得到了非常多的正面反馈，因此当时想着我可以尝试着走走心理咨询师这条道路，于是J人开始行动，在德瑞姆学了两年，考了国家心理咨询师三级，在杭州七院开始做危机干预热线，当时觉得挺顺的，觉得自己就是为这个事业而生的，殊不知当你这么想的时候，正是处在愚昧之巅的时候，然后，顺理成章就下滑到绝望之谷，发现自己对于直接做心理咨询师帮助他人，或许并不合适。
          - paragraph [ref=e72]: 然后，某日在云南大理洱海旁，忽然灵光一闪，想着既然我会技术，又学了那么久的心理学，为何不把这两者结合起来，在这两个领域的交叉地带做些事情呢。
          - paragraph [ref=e73]: 事情从这里开始有了转变，开始走上一条平稳之坡了，先在杭州心猫网络（心理咨询平台）从零搭建心理测评类产品，一段非常幸福的职业生涯，也让我知道从事自己所热爱的事业是什么感觉。而后，也在杭州健海科技（慢病健康管理平台）主导 AI 实验室并构建 ASR 语音识别引擎，这段时间稍微有点偏离自己的主题，但好在也学习了很多健康管理和AI的知识，也不算浪费，心理健康必将从单维度的心理咨询单兵作战转变到多维度的心理健康管理的持久战。
          - paragraph [ref=e74]: 接下来，三十五岁，一个临界值的年龄，决定跳出公司的晋升路径，追求一个人操盘一件事情的可能，这个可能也许是自己的产品，也许是与这个赛道的同行者合作开发相关产品，也有可能就不做研发的事情了，毕竟这块事情价值越来越低，不过疗愈这个核心是我一直想要坚持下去的，只要是围绕这件事，其他我保持开放态度。
          - paragraph [ref=e75]: 上面就是我大致的来时路了，这一路走来并没有取得太多亮眼的成绩，好在也没有遭受过多大的挫折，对于得到的东西我异常感恩，对于失去的东西我也并不舍得，只是人生不是只活在上半场，下半场还剩很多年（也许），还是希望有可以折腾的事情让我渡过这漫长而又丰满的一生。
        - button "展开完整故事" [ref=e76] [cursor=pointer]
